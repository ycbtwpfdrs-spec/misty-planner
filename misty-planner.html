<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>misty · planner</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;500;600;700&family=Pangolin&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --moss:    #6e9080;
  --deep:    #3a5448;
  --shore:   #a8c4b4;
  --petal:   #c9a8b8;
  --bloom:   #e8d0dc;
  --crystal: #a8c0d0;
  --straw:   #d4bc90;
  --lilac:   #b8a8cc;
  --text:    #2c3d36;
  --text2:   #5a7a6a;
  --text3:   #90a89c;
  --glass:   rgba(240,246,242,0.68);
  --glass2:  rgba(228,238,232,0.52);
  --border:  rgba(160,194,174,0.38);
}

html, body {
  height: 100%;
  font-family: 'Pangolin', cursive;
  background: #c8d8cc;
  color: var(--text);
  overflow-x: hidden;
}

/* ══ IMPRESSIONIST CANVAS BACKGROUND ══ */
.bg-wrap {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: #c8d2cc;
}

#bg-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* Rain */
.rain-wrap { position:absolute;inset:0;overflow:hidden;opacity:0.10;pointer-events:none; }
.drop {
  position:absolute;
  width:1px;
  background:linear-gradient(to bottom,transparent,rgba(160,200,185,0.8),transparent);
  border-radius:1px;
  animation:dropFall linear infinite;
}
@keyframes dropFall {
  0%   { transform:translateY(-80px);opacity:0; }
  8%   { opacity:1; }
  92%  { opacity:0.5; }
  100% { transform:translateY(105vh);opacity:0; }
}

/* ══ LAYOUT ══ */
.app { position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column; }

/* ══ NAV ══ */
nav {
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;
  backdrop-filter:blur(14px) saturate(1.15);
  background:rgba(200,220,210,0.38);
  border-bottom:1px solid rgba(160,194,174,0.28);
}

.nav-logo {
  font-family:'Cinzel',serif;
  font-size:20px;
  font-weight:600;
  color:var(--deep);
  letter-spacing:4px;
  text-transform:lowercase;
}

.nav-tabs {
  display:flex;gap:4px;
  background:rgba(160,194,174,0.18);
  border:1px solid rgba(140,180,158,0.28);
  border-radius:30px;
  padding:4px;
}
.nav-tab {
  background:none;border:none;border-radius:24px;
  padding:7px 18px;
  font-family:'Pangolin',cursive;
  font-size:12px;letter-spacing:0.5px;
  color:var(--text2);cursor:pointer;
  transition:all 0.3s ease;
}
.nav-tab.active {
  background:rgba(255,255,255,0.60);
  color:var(--deep);
  box-shadow:0 1px 8px rgba(60,90,78,0.10);
}

.nav-time { display: none; }

.fixed-clock {
  position: fixed;
  bottom: 24px;
  right: 28px;
  z-index: 100;
  backdrop-filter: blur(14px) saturate(1.1);
  background: rgba(220, 232, 224, 0.52);
  border: 1px solid rgba(150, 185, 165, 0.35);
  border-radius: 16px;
  padding: 10px 18px;
  font-family: 'Cinzel', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--deep);
  letter-spacing: 3px;
  box-shadow: 0 4px 20px rgba(50, 80, 65, 0.10);
  pointer-events: none;
}

/* ══ MAIN ══ */
main { flex:1;padding:26px 22px;max-width:1000px;margin:0 auto;width:100%; }

.page { display:none;animation:fadeUp 0.45s ease; }
.page.active { display:block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }

/* ══ CARDS ══ */
.card {
  backdrop-filter:blur(18px) saturate(1.18);
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:22px;
  padding:26px;
  box-shadow:0 4px 28px rgba(50,80,65,0.08),0 1px 4px rgba(50,80,65,0.04);
}

.sec-label {
  font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:3px;
  color:var(--text3);text-transform:uppercase;
  margin-bottom:16px;font-weight:600;
}

/* ══ POMODORO ══ */
.pomo-layout { display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start; }
@media(max-width:600px){.pomo-layout{grid-template-columns:1fr}}

.timer-card { display:flex;flex-direction:column;align-items:center;padding:32px 26px; }

.timer-ring-outer {
  position:relative;width:184px;height:184px;margin-bottom:22px;
}
.timer-ring-outer svg { position:absolute;inset:0;transform:rotate(-90deg); }
.ring-track  { fill:none;stroke:rgba(140,180,158,0.18);stroke-width:3; }
.ring-fill {
  fill:none;stroke-width:3;stroke-linecap:round;
  transition:stroke-dashoffset 1s linear;
  filter:drop-shadow(0 0 8px rgba(110,144,128,0.45));
}

.timer-inner {
  position:absolute;inset:14px;border-radius:50%;
  background:radial-gradient(circle,rgba(240,246,242,0.92) 40%,rgba(215,232,222,0.65) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:inset 0 2px 14px rgba(60,90,78,0.06);
}
.timer-digits {
  font-family:'Cinzel',serif;font-size:38px;font-weight:600;
  color:var(--deep);letter-spacing:3px;line-height:1;
}
.timer-lbl {
  font-family:'Pangolin',cursive;
  font-size:10px;letter-spacing:2px;color:var(--text3);margin-top:6px;
}

.ripple {
  position:absolute;inset:-10px;border-radius:50%;
  border:1px solid rgba(110,144,128,0.28);
  animation:rOut 2.8s ease-out infinite;opacity:0;pointer-events:none;
}
.ripple.r2{animation-delay:1.4s;}
@keyframes rOut{0%{transform:scale(0.9);opacity:0.55}100%{transform:scale(1.18);opacity:0}}
.ripple.off{animation-play-state:paused}

.pomo-dots{display:flex;gap:9px;margin-bottom:20px;}
.pdot{
  width:7px;height:7px;border-radius:50%;
  border:1px solid rgba(110,144,128,0.35);background:transparent;
  transition:all 0.4s ease;
}
.pdot.lit{background:var(--moss);border-color:var(--moss);box-shadow:0 0 6px rgba(110,144,128,0.5);}

.pomo-btns{display:flex;gap:10px;margin-bottom:18px;}

.btn {
  background:rgba(110,144,128,0.15);
  border:1px solid rgba(110,144,128,0.28);
  border-radius:30px;padding:10px 22px;
  font-family:'Pangolin',cursive;font-size:13px;letter-spacing:0.5px;
  color:var(--deep);cursor:pointer;
  transition:all 0.25s ease;backdrop-filter:blur(6px);
}
.btn:hover{background:rgba(110,144,128,0.28);box-shadow:0 2px 12px rgba(60,90,78,0.12);}
.btn.primary{background:rgba(58,84,72,0.72);color:rgba(240,246,242,0.95);border-color:transparent;}
.btn.primary:hover{background:rgba(58,84,72,0.88);}

.mode-chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.mchip{
  background:rgba(168,192,180,0.18);border:1px solid rgba(148,178,162,0.28);
  border-radius:20px;padding:5px 14px;
  font-family:'Pangolin',cursive;font-size:11px;letter-spacing:0.5px;
  color:var(--text2);cursor:pointer;transition:all 0.2s;
}
.mchip:hover{background:rgba(168,192,180,0.35);}
.mchip.active{background:rgba(185,165,200,0.32);border-color:rgba(170,148,188,0.38);color:var(--deep);}

/* settings */
.pomo-side{display:flex;flex-direction:column;gap:14px;}
.srow{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid rgba(140,180,158,0.18);
}
.srow:last-child{border-bottom:none;}
.sname{font-size:13px;color:var(--text2);}
.sctrl{display:flex;align-items:center;gap:10px;}
.nbtn{
  width:26px;height:26px;border-radius:50%;
  border:1px solid rgba(110,144,128,0.28);background:rgba(110,144,128,0.1);
  color:var(--deep);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;
  font-family:'Cinzel',serif;
}
.nbtn:hover{background:rgba(110,144,128,0.25);}
.nval{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:var(--deep);min-width:30px;text-align:center;}

.log-wrap{max-height:130px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
.log-wrap::-webkit-scrollbar{width:3px;}
.log-wrap::-webkit-scrollbar-thumb{background:var(--shore);border-radius:3px;}
.log-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--moss);flex-shrink:0;}
.ldot.brk{background:var(--petal);}
.ltime{font-family:'Cinzel',serif;font-size:10px;color:var(--text3);margin-left:auto;}

/* ══ TASKS ══ */
.tasks-layout{display:grid;grid-template-columns:1fr 300px;gap:18px;align-items:start;}
@media(max-width:680px){.tasks-layout{grid-template-columns:1fr}}

.f-pills{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.fpill{
  background:rgba(168,192,180,0.18);border:1px solid rgba(148,178,162,0.28);
  border-radius:20px;padding:5px 14px;
  font-family:'Pangolin',cursive;font-size:11px;letter-spacing:0.5px;
  color:var(--text2);cursor:pointer;transition:all 0.2s;
}
.fpill:hover{background:rgba(168,192,180,0.35);}
.fpill.active{background:rgba(58,84,72,0.68);color:rgba(240,246,242,0.9);border-color:transparent;}

.tlist{display:flex;flex-direction:column;gap:8px;min-height:200px;}

.titem{
  backdrop-filter:blur(10px);
  background:rgba(240,246,242,0.58);
  border:1px solid rgba(168,200,180,0.38);
  border-radius:14px;padding:13px 15px;
  display:flex;align-items:flex-start;gap:12px;
  transition:all 0.25s;animation:slideIn 0.3s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.titem:hover{background:rgba(240,246,242,0.78);box-shadow:0 3px 14px rgba(50,80,65,0.08);}
.titem.done-i{opacity:0.42;}

.tchk{
  width:18px;height:18px;border-radius:50%;margin-top:2px;flex-shrink:0;
  border:1.5px solid rgba(110,144,128,0.45);background:rgba(255,255,255,0.4);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.25s;font-size:9px;color:transparent;
}
.tchk.on{background:rgba(110,144,128,0.68);border-color:var(--moss);color:white;}

.tcont{flex:1;min-width:0;}
.tname{font-size:13px;color:var(--text);margin-bottom:5px;line-height:1.4;}
.tname.strk{text-decoration:line-through;color:var(--text3);}
.tmeta{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}

.ptag{
  font-size:9px;letter-spacing:1px;padding:2px 9px;border-radius:20px;
  font-family:'Pangolin',cursive;
}
.p-high{background:rgba(148,184,162,0.38);color:var(--deep);border:1px solid rgba(110,144,128,0.28);}
.p-mid {background:rgba(195,168,180,0.38);color:#5a3050;border:1px solid rgba(175,148,165,0.28);}
.p-low {background:rgba(168,188,210,0.38);color:#304058;border:1px solid rgba(148,170,195,0.28);}

.dtag{font-size:10px;color:var(--text3);font-family:'Cinzel',serif;}
.tdel{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;opacity:0;transition:opacity 0.2s;padding:2px;margin-top:1px;flex-shrink:0;}
.titem:hover .tdel{opacity:1;}

.empty-t{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;color:var(--text3);font-size:13px;gap:8px;}
.empty-t span:first-child{font-size:26px;opacity:0.45;}

.add-card{display:flex;flex-direction:column;gap:13px;}

.inp{
  width:100%;
  background:rgba(240,246,242,0.58);
  border:1px solid rgba(148,180,162,0.38);
  border-radius:12px;padding:10px 13px;
  font-family:'Pangolin',cursive;font-size:13px;color:var(--text);
  outline:none;transition:all 0.2s;backdrop-filter:blur(6px);
}
.inp::placeholder{color:var(--text3);}
.inp:focus{border-color:rgba(110,144,128,0.50);background:rgba(240,246,242,0.80);box-shadow:0 0 0 3px rgba(110,144,128,0.08);}

.row-lbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;font-weight:500;margin-bottom:6px;}

.pri-sel{display:flex;gap:6px;}
.popt{
  flex:1;padding:7px 4px;border-radius:10px;
  border:1px solid rgba(148,178,162,0.28);
  background:rgba(240,246,242,0.38);
  font-family:'Pangolin',cursive;font-size:11px;letter-spacing:0.5px;
  color:var(--text2);cursor:pointer;text-align:center;transition:all 0.2s;
}
.popt:hover{background:rgba(240,246,242,0.65);}
.popt.s-high{background:rgba(148,184,162,0.45);border-color:rgba(110,144,128,0.38);color:var(--deep);}
.popt.s-mid {background:rgba(195,168,180,0.45);border-color:rgba(175,148,165,0.38);color:#5a3050;}
.popt.s-low {background:rgba(168,188,210,0.45);border-color:rgba(148,170,195,0.38);color:#304058;}

.btn-add{
  width:100%;background:rgba(58,84,72,0.70);color:rgba(240,246,242,0.95);
  border:none;border-radius:12px;padding:12px;
  font-family:'Pangolin',cursive;font-size:13px;letter-spacing:1px;
  cursor:pointer;transition:all 0.25s;
}
.btn-add:hover{background:rgba(58,84,72,0.88);box-shadow:0 3px 14px rgba(50,80,65,0.18);}

/* ══ CALENDAR ══ */
.cal-layout{display:grid;grid-template-columns:1fr 290px;gap:18px;align-items:start;}
@media(max-width:680px){.cal-layout{grid-template-columns:1fr}}

.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.cal-title{font-family:'Cinzel',serif;font-size:20px;font-weight:600;color:var(--deep);letter-spacing:2px;}
.cal-nav{display:flex;gap:6px;}
.cnbtn{
  width:30px;height:30px;border-radius:50%;
  border:1px solid rgba(110,144,128,0.28);background:rgba(110,144,128,0.1);
  color:var(--text2);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;
}
.cnbtn:hover{background:rgba(110,144,128,0.25);}

.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cdname{text-align:center;font-size:9px;color:var(--text3);letter-spacing:1px;padding:4px 0 8px;font-family:'Cinzel',serif;font-weight:500;}
.cday{
  aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:10px;font-size:12px;cursor:pointer;color:var(--text);
  position:relative;transition:all 0.2s;
}
.cday:hover:not(.empty){background:rgba(168,192,180,0.25);}
.cday.other{color:var(--text3);}
.cday.today{background:rgba(110,144,128,0.22);color:var(--deep);font-weight:bold;}
.cday.today::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:var(--moss);}
.cday.sel{background:rgba(58,84,72,0.62);color:rgba(240,246,242,0.95);}
.cday.has-ev::before{content:'';position:absolute;top:4px;right:5px;width:3px;height:3px;border-radius:50%;background:var(--petal);}

.ev-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.ev-dlbl{font-family:'Cinzel',serif;font-style:normal;font-size:15px;color:var(--deep);font-weight:600;letter-spacing:1px;}
.ev-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;min-height:80px;}

.eitem{
  background:rgba(240,246,242,0.62);
  border:1px solid rgba(168,200,180,0.38);
  border-left:3px solid var(--moss);
  border-radius:0 10px 10px 0;
  padding:10px 12px;
  display:flex;align-items:flex-start;justify-content:space-between;gap:8px;
  animation:slideIn 0.3s ease;
}
.eitem.petal-e{border-left-color:var(--petal);}
.eitem.crystal-e{border-left-color:var(--crystal);}
.ename{font-size:12px;color:var(--text);}
.etime{font-family:'Cinzel',serif;font-size:10px;color:var(--text3);margin-top:3px;}
.edel{background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;opacity:0;transition:opacity 0.2s;}
.eitem:hover .edel{opacity:1;}

.no-ev{font-size:12px;color:var(--text3);font-style:italic;text-align:center;padding:20px 0;font-family:'Cinzel',serif;font-weight:400;letter-spacing:1px;}

.add-ev-area{display:flex;flex-direction:column;gap:8px;border-top:1px solid rgba(140,178,158,0.2);padding-top:12px;}
.irow{display:flex;gap:7px;}
.inp-t{width:90px;background:rgba(240,246,242,0.58);border:1px solid rgba(148,178,162,0.35);border-radius:10px;padding:9px 10px;font-family:'Cinzel',serif;font-size:12px;color:var(--text);outline:none;transition:all 0.2s;}
.inp-t:focus{border-color:rgba(110,144,128,0.5);}
.cdots{display:flex;gap:7px;align-items:center;}
.cdot{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.2s;}
.cdot.sel{border-color:var(--deep);transform:scale(1.2);}
.cd-g{background:var(--moss);}
.cd-p{background:var(--petal);}
.cd-c{background:var(--crystal);}
</style>
</head>
<body>

<div class="bg-wrap">
  <canvas id="bg-canvas"></canvas>
  <div class="rain-wrap" id="rain-wrap"></div>
</div>

<div class="app">
  <nav>
    <div class="nav-logo">misty</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('pomo',this)">pomodoro</button>
      <button class="nav-tab" onclick="showPage('tasks',this)">tasks</button>
      <button class="nav-tab" onclick="showPage('calendar',this)">calendar</button>
    </div>
    <div class="nav-time" id="nav-time">--:--:--</div>
  </nav>

  <main>

    <!-- POMODORO -->
    <div class="page active" id="page-pomo">
      <div class="pomo-layout">
        <div class="card timer-card">
          <p class="sec-label">focus timer</p>
          <div class="timer-ring-outer">
            <svg viewBox="0 0 184 184" width="184" height="184">
              <circle class="ring-track" cx="92" cy="92" r="84"/>
              <circle class="ring-fill" id="ring-fill" cx="92" cy="92" r="84"
                stroke="url(#rg1)" stroke-dasharray="527.8" stroke-dashoffset="0"/>
              <defs>
                <linearGradient id="rg1" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#6e9080"/>
                  <stop offset="50%" stop-color="#a8c4b4"/>
                  <stop offset="100%" stop-color="#d4bc90"/>
                </linearGradient>
                <linearGradient id="rg2" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#c9a8b8"/>
                  <stop offset="100%" stop-color="#b8a8cc"/>
                </linearGradient>
              </defs>
            </svg>
            <div class="ripple off" id="r1"></div>
            <div class="ripple r2 off" id="r2"></div>
            <div class="timer-inner">
              <div class="timer-digits" id="t-digits">25:00</div>
              <div class="timer-lbl" id="t-lbl">work</div>
            </div>
          </div>

          <div class="pomo-dots">
            <div class="pdot" id="pd0"></div>
            <div class="pdot" id="pd1"></div>
            <div class="pdot" id="pd2"></div>
            <div class="pdot" id="pd3"></div>
          </div>

          <div class="pomo-btns">
            <button class="btn primary" id="p-start" onclick="togglePomo()">start</button>
            <button class="btn" onclick="resetPomo()">reset</button>
          </div>

          <div class="mode-chips">
            <button class="mchip active" id="c-work"  onclick="switchMode('work')">work</button>
            <button class="mchip"        id="c-short" onclick="switchMode('short')">short break</button>
            <button class="mchip"        id="c-long"  onclick="switchMode('long')">long break</button>
          </div>
        </div>

        <div class="pomo-side">
          <div class="card">
            <p class="sec-label">settings</p>
            <div class="srow">
              <span class="sname">work</span>
              <div class="sctrl">
                <button class="nbtn" onclick="adj('work',-5)">−</button>
                <span class="nval" id="s-work">25</span><span style="font-size:10px;color:var(--text3)">m</span>
                <button class="nbtn" onclick="adj('work',5)">+</button>
              </div>
            </div>
            <div class="srow">
              <span class="sname">short break</span>
              <div class="sctrl">
                <button class="nbtn" onclick="adj('short',-1)">−</button>
                <span class="nval" id="s-short">5</span><span style="font-size:10px;color:var(--text3)">m</span>
                <button class="nbtn" onclick="adj('short',1)">+</button>
              </div>
            </div>
            <div class="srow">
              <span class="sname">long break</span>
              <div class="sctrl">
                <button class="nbtn" onclick="adj('long',-5)">−</button>
                <span class="nval" id="s-long">15</span><span style="font-size:10px;color:var(--text3)">m</span>
                <button class="nbtn" onclick="adj('long',5)">+</button>
              </div>
            </div>
          </div>
          <div class="card">
            <p class="sec-label">session log</p>
            <div class="log-wrap" id="log-wrap">
              <div style="font-size:12px;color:var(--text3);font-style:italic;">no sessions yet…</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- TASKS -->
    <div class="page" id="page-tasks">
      <div class="tasks-layout">
        <div class="card">
          <p class="sec-label">tasks</p>
          <div class="f-pills">
            <button class="fpill active" onclick="setTF('all',this)">all</button>
            <button class="fpill" onclick="setTF('todo',this)">todo</button>
            <button class="fpill" onclick="setTF('done',this)">done</button>
            <button class="fpill" onclick="setTF('high',this)">high</button>
            <button class="fpill" onclick="setTF('mid',this)">mid</button>
            <button class="fpill" onclick="setTF('low',this)">low</button>
          </div>
          <div class="tlist" id="tlist"></div>
        </div>
        <div class="card add-card">
          <p class="sec-label">add task</p>
          <input class="inp" id="t-name" placeholder="task name…" onkeydown="if(event.key==='Enter')addTask()">
          <div>
            <div class="row-lbl">due date</div>
            <input class="inp" type="date" id="t-date">
          </div>
          <div>
            <div class="row-lbl">priority</div>
            <div class="pri-sel">
              <button class="popt s-high" id="po-high" onclick="selP('high')">high</button>
              <button class="popt"        id="po-mid"  onclick="selP('mid')">mid</button>
              <button class="popt"        id="po-low"  onclick="selP('low')">low</button>
            </div>
          </div>
          <button class="btn-add" onclick="addTask()">+ add</button>
        </div>
      </div>
    </div>

    <!-- CALENDAR -->
    <div class="page" id="page-calendar">
      <div class="cal-layout">
        <div class="card">
          <div class="cal-head">
            <div class="cal-title" id="cal-title">May 2026</div>
            <div class="cal-nav">
              <button class="cnbtn" onclick="calNav(-1)">‹</button>
              <button class="cnbtn" onclick="calNav(1)">›</button>
            </div>
          </div>
          <div class="cgrid" id="cgrid"></div>
        </div>
        <div class="card">
          <div class="ev-head">
            <div class="ev-dlbl" id="ev-dlbl">May 28</div>
            <button class="btn" style="font-size:11px;padding:6px 14px" onclick="toggleAddEv()">+ event</button>
          </div>
          <div class="ev-list" id="ev-list"></div>
          <div id="add-ev" class="add-ev-area" style="display:none">
            <input class="inp" id="ev-name" placeholder="event name…" onkeydown="if(event.key==='Enter')addEvent()">
            <div class="irow">
              <input class="inp-t" type="time" id="ev-time" value="09:00">
              <div class="cdots" style="margin-left:auto">
                <div class="cdot cd-g sel" id="cd-g" onclick="selC('g')"></div>
                <div class="cdot cd-p"     id="cd-p" onclick="selC('p')"></div>
                <div class="cdot cd-c"     id="cd-c" onclick="selC('c')"></div>
              </div>
            </div>
            <button class="btn-add" onclick="addEvent()">+ add event</button>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<div class="fixed-clock" id="fixed-clock">--:--:--</div>

<script>
// ── IMPRESSIONIST CANVAS PAINTING ─────────────────────────
(function paintCanvas() {
  const canvas = document.getElementById('bg-canvas');
  const W = canvas.width  = window.innerWidth;
  const H = canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  // Seed RNG for reproducible composition
  let seed = 42;
  function rng() { seed = (seed * 16807 + 0) % 2147483647; return (seed - 1) / 2147483646; }
  function rr(a, b) { return a + rng() * (b - a); }

  // ── Palette: impressionist water / garden colours ──
  const palettes = [
    // sage greens / water surface
    ['#8aaa90','#6e9078','#a0bca8','#7e9c88','#b4c8b2','#5a7a60'],
    // soft lavender / rose reflections
    ['#b0a0c0','#c8b4c4','#a898b8','#d4c0cc','#b8a4b8','#9888a8'],
    // warm amber / straw / light
    ['#c8b080','#d4be94','#baa070','#e0cc9a','#c4aa7a','#b89868'],
    // cool blue / teal / sky reflections
    ['#8aa8b8','#7898a8','#a0bcc8','#6e90a2','#b0c8d4','#7aa0b0'],
    // dusty blush / petal pink
    ['#c8a8b0','#d4b8bc','#bc9aa4','#e0c4c4','#c0a0a8','#b89098'],
  ];

  // Base fill — muted water-grey-green
  ctx.fillStyle = '#c4d0c8';
  ctx.fillRect(0, 0, W, H);

  // ── Helper: draw one impressionist brushstroke ──
  function stroke(x, y, len, angle, w, color, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = color;
    ctx.lineWidth = w;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.translate(x, y);
    ctx.rotate(angle);

    // Short curved strokes (dabs)
    ctx.beginPath();
    const wobble = rr(-0.18, 0.18);
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(
      len * 0.4 + rr(-4, 4),
      rr(-w * 1.2, w * 1.2),
      len + rr(-3, 3),
      rr(-2, 2)
    );
    ctx.stroke();
    ctx.restore();
  }

  // ── Layer 1: broad background washes (large soft strokes) ──
  const bgZones = [
    { cx: W*0.15, cy: H*0.75, pal: 0, density: 180, size: [30,80], alpha: [0.18,0.35] },
    { cx: W*0.75, cy: H*0.15, pal: 1, density: 160, size: [25,70], alpha: [0.15,0.30] },
    { cx: W*0.55, cy: H*0.55, pal: 2, density: 140, size: [28,65], alpha: [0.12,0.25] },
    { cx: W*0.85, cy: H*0.70, pal: 0, density: 120, size: [20,60], alpha: [0.14,0.28] },
    { cx: W*0.30, cy: H*0.20, pal: 3, density: 150, size: [22,68], alpha: [0.13,0.26] },
    { cx: W*0.70, cy: H*0.40, pal: 4, density: 130, size: [20,55], alpha: [0.12,0.24] },
  ];

  bgZones.forEach(z => {
    const pal = palettes[z.pal];
    for (let i = 0; i < z.density; i++) {
      const r = rr(0, Math.min(W, H) * 0.38);
      const a = rr(0, Math.PI * 2);
      const x = z.cx + Math.cos(a) * r * rr(0.3, 1.0);
      const y = z.cy + Math.sin(a) * r * rr(0.3, 1.0) * 0.6;
      const len = rr(z.size[0], z.size[1]);
      const angle = rr(-0.3, 0.3) + (y / H) * 0.4; // slight horizontal lean
      const w = rr(6, 18);
      const color = pal[Math.floor(rng() * pal.length)];
      stroke(x, y, len, angle, w, color, rr(z.alpha[0], z.alpha[1]));
    }
  });

  // ── Layer 2: mid-density directional strokes ──
  // Horizontal water-surface strokes (Monet pond style)
  for (let i = 0; i < 600; i++) {
    const x = rr(0, W);
    const y = rr(0, H);
    // colour influenced by vertical position — darker/greener low, lighter/cooler high
    const t = y / H;
    let palIdx;
    if (t > 0.65)      palIdx = 0; // deep greens at bottom
    else if (t > 0.40) palIdx = rng() > 0.5 ? 2 : 3;
    else               palIdx = rng() > 0.5 ? 1 : 3; // lavender/blue up top

    const pal = palettes[palIdx];
    const color = pal[Math.floor(rng() * pal.length)];
    const len = rr(8, 38);
    const angle = rr(-0.12, 0.12); // nearly horizontal
    const w = rr(2, 7);
    stroke(x, y, len, angle, w, color, rr(0.10, 0.28));
  }

  // ── Layer 3: short thick dabs (impasto dots) ──
  for (let i = 0; i < 800; i++) {
    const x = rr(0, W);
    const y = rr(0, H);
    const palIdx = Math.floor(rng() * palettes.length);
    const color = palettes[palIdx][Math.floor(rng() * palettes[palIdx].length)];
    const len = rr(2, 14);
    const angle = rr(0, Math.PI * 2);
    const w = rr(2, 6);
    stroke(x, y, len, angle, w, color, rr(0.06, 0.18));
  }

  // ── Layer 4: light glaze — thin pale overlay strokes for unity ──
  const glazeColors = ['#e8ece8','#dde8e0','#e4dce8','#e8e0d4','#dce4ec'];
  for (let i = 0; i < 300; i++) {
    const x = rr(0, W);
    const y = rr(0, H);
    const color = glazeColors[Math.floor(rng() * glazeColors.length)];
    const len = rr(12, 50);
    const angle = rr(-0.15, 0.15);
    const w = rr(3, 10);
    stroke(x, y, len, angle, w, color, rr(0.04, 0.12));
  }

  // ── Slow gentle animation: redraw subtle shimmer on top ──
  let frame = 0;
  function shimmer() {
    frame++;
    if (frame % 90 === 0) {
      // Every ~3s at 30fps: add a few new glaze strokes for living feel
      ctx.save();
      for (let i = 0; i < 6; i++) {
        const x = rr(0, W); const y = rr(0, H);
        const color = glazeColors[Math.floor(rng() * glazeColors.length)];
        stroke(x, y, rr(8,30), rr(-0.1,0.1), rr(2,8), color, rr(0.03, 0.09));
      }
      ctx.restore();
    }
    requestAnimationFrame(shimmer);
  }
  shimmer();

  window.addEventListener('resize', () => {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    seed = 42;
    paintCanvas();
  });
})();

// ── RAIN ──────────────────────────────────────────────────
const rw = document.getElementById('rain-wrap');
for(let i=0;i<38;i++){
  const d=document.createElement('div');
  d.className='drop';
  const h=Math.random()*55+28;
  d.style.cssText=`left:${Math.random()*100}%;height:${h}px;animation-duration:${Math.random()*2.2+1.6}s;animation-delay:${Math.random()*5}s;opacity:${Math.random()*0.4+0.25};`;
  rw.appendChild(d);
}

// ── CLOCK ─────────────────────────────────────────────────
setInterval(()=>{
  const n=new Date(),p=x=>x.toString().padStart(2,'0');
  const t=`${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  document.getElementById('nav-time').textContent=t;
  document.getElementById('fixed-clock').textContent=t;
},1000);

// ── NAV ───────────────────────────────────────────────────
function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='calendar')renderCal();
}

// ── POMODORO ──────────────────────────────────────────────
const S={work:25,short:5,long:15};
let mode='work',rem=25*60,tot=25*60,run=false,pInt=null,pcnt=0,plog=[];
const CIRC=527.8;
function gd(m){return S[m]*60;}

function updTimer(){
  const m=Math.floor(rem/60).toString().padStart(2,'0');
  const s=(rem%60).toString().padStart(2,'0');
  document.getElementById('t-digits').textContent=`${m}:${s}`;
  document.getElementById('t-lbl').textContent=mode==='work'?'work':mode==='short'?'short break':'long break';
  document.getElementById('ring-fill').style.strokeDashoffset=CIRC*(1-rem/tot);
  document.getElementById('ring-fill').setAttribute('stroke',mode==='work'?'url(#rg1)':'url(#rg2)');
}

function togglePomo(){
  if(run){
    clearInterval(pInt);run=false;
    document.getElementById('p-start').textContent='start';
    document.getElementById('r1').classList.add('off');
    document.getElementById('r2').classList.add('off');
  }else{
    run=true;
    document.getElementById('p-start').textContent='pause';
    document.getElementById('r1').classList.remove('off');
    document.getElementById('r2').classList.remove('off');
    pInt=setInterval(()=>{
      rem--;updTimer();
      if(rem<=0){
        clearInterval(pInt);run=false;
        document.getElementById('p-start').textContent='start';
        document.getElementById('r1').classList.add('off');
        document.getElementById('r2').classList.add('off');
        if(mode==='work'){
          pcnt=Math.min(pcnt+1,4);updDots();logSes('work');
          switchMode(pcnt>=4?'long':'short');
        }else{
          logSes(mode);
          if(pcnt>=4){pcnt=0;updDots();}
          switchMode('work');
        }
      }
    },1000);
  }
}

function resetPomo(){
  clearInterval(pInt);run=false;
  document.getElementById('p-start').textContent='start';
  document.getElementById('r1').classList.add('off');
  document.getElementById('r2').classList.add('off');
  rem=gd(mode);tot=rem;updTimer();
}

function switchMode(m){
  mode=m;rem=gd(m);tot=rem;
  ['work','short','long'].forEach(x=>document.getElementById('c-'+x).classList.toggle('active',x===m));
  updTimer();
}

function adj(k,d){
  S[k]=Math.max(1,S[k]+d);
  document.getElementById('s-'+k).textContent=S[k];
  if(mode===k){rem=gd(k);tot=rem;updTimer();}
}

function updDots(){for(let i=0;i<4;i++)document.getElementById('pd'+i).classList.toggle('lit',i<pcnt);}

function logSes(m){
  const n=new Date(),p=x=>x.toString().padStart(2,'0');
  plog.unshift({m,t:`${p(n.getHours())}:${p(n.getMinutes())}`});
  if(plog.length>10)plog.pop();
  const el=document.getElementById('log-wrap');
  el.innerHTML=plog.map(s=>`
    <div class="log-row">
      <div class="ldot ${s.m!=='work'?'brk':''}"></div>
      <span>${s.m==='work'?'work session':s.m+' break'}</span>
      <span class="ltime">${s.t}</span>
    </div>`).join('');
}

updTimer();

// ── TASKS ─────────────────────────────────────────────────
let tasks=[],tf='all',tp='high',tid=1;

function addTask(){
  const n=document.getElementById('t-name').value.trim();
  if(!n)return;
  const dv=document.getElementById('t-date').value;
  const ds=dv?fmtDate(new Date(dv+'T00:00:00')):'no date';
  tasks.unshift({id:tid++,name:n,priority:tp,date:ds,done:false});
  document.getElementById('t-name').value='';
  renderTasks();
}

function fmtDate(d){
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${M[d.getMonth()]} ${d.getDate()}`;
}

function togTask(id){const t=tasks.find(t=>t.id===id);if(t)t.done=!t.done;renderTasks();}
function delTask(id){tasks=tasks.filter(t=>t.id!==id);renderTasks();}

function setTF(f,btn){
  tf=f;
  document.querySelectorAll('.fpill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTasks();
}

function selP(p){
  tp=p;
  ['high','mid','low'].forEach(x=>{
    document.getElementById('po-'+x).className='popt'+(x===p?` s-${x}`:'');
  });
}

function renderTasks(){
  let fl=tasks;
  if(tf==='todo')fl=tasks.filter(t=>!t.done);
  else if(tf==='done')fl=tasks.filter(t=>t.done);
  else if(['high','mid','low'].includes(tf))fl=tasks.filter(t=>t.priority===tf);
  const el=document.getElementById('tlist');
  if(!fl.length){el.innerHTML=`<div class="empty-t"><span>🌿</span><span>nothing here yet…</span></div>`;return;}
  el.innerHTML=fl.map(t=>`
    <div class="titem ${t.done?'done-i':''}">
      <div class="tchk ${t.done?'on':''}" onclick="togTask(${t.id})">✓</div>
      <div class="tcont">
        <div class="tname ${t.done?'strk':''}">${t.name}</div>
        <div class="tmeta">
          <span class="ptag p-${t.priority}">${t.priority}</span>
          <span class="dtag">${t.date}</span>
        </div>
      </div>
      <button class="tdel" onclick="delTask(${t.id})">✕</button>
    </div>`).join('');
}
renderTasks();

// ── CALENDAR ──────────────────────────────────────────────
const TD=new Date();
let cy=TD.getFullYear(),cm=TD.getMonth(),sd=TD.getDate();
const evs={};let showAE=false,ec='g',eid=1;
const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DS=['Su','Mo','Tu','We','Th','Fr','Sa'];
const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function ck(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}

function renderCal(){
  document.getElementById('cal-title').textContent=`${MN[cm]} ${cy}`;
  const g=document.getElementById('cgrid');g.innerHTML='';
  DS.forEach(d=>{const e=document.createElement('div');e.className='cdname';e.textContent=d;g.appendChild(e);});
  const fd=new Date(cy,cm,1).getDay(),dim=new Date(cy,cm+1,0).getDate(),pd=new Date(cy,cm,0).getDate();
  for(let i=0;i<fd;i++){const e=document.createElement('div');e.className='cday other';e.textContent=pd-fd+1+i;g.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const e=document.createElement('div');e.className='cday';e.textContent=d;
    const it=d===TD.getDate()&&cm===TD.getMonth()&&cy===TD.getFullYear();
    if(it)e.classList.add('today');
    if(d===sd)e.classList.add('sel');
    if(evs[ck(cy,cm,d)]?.length)e.classList.add('has-ev');
    e.onclick=()=>{sd=d;renderCal();renderEvs();};
    g.appendChild(e);
  }
  const r=42-fd-dim;
  for(let i=1;i<=r;i++){const e=document.createElement('div');e.className='cday other';e.textContent=i;g.appendChild(e);}
  renderEvs();
}

function calNav(d){
  cm+=d;
  if(cm<0){cm=11;cy--;}
  if(cm>11){cm=0;cy++;}
  renderCal();
}

function renderEvs(){
  const key=ck(cy,cm,sd);
  document.getElementById('ev-dlbl').textContent=`${MS[cm]} ${sd}`;
  const el=document.getElementById('ev-list');
  const ev=evs[key]||[];
  if(!ev.length){el.innerHTML=`<div class="no-ev">no events for this day…</div>`;return;}
  el.innerHTML=ev.map(e=>`
    <div class="eitem ${e.c==='p'?'petal-e':e.c==='c'?'crystal-e':''}">
      <div><div class="ename">${e.name}</div><div class="etime">${e.time}</div></div>
      <button class="edel" onclick="delEv('${key}',${e.id})">✕</button>
    </div>`).join('');
}

function delEv(k,id){evs[k]=(evs[k]||[]).filter(e=>e.id!==id);renderCal();}

function toggleAddEv(){
  showAE=!showAE;
  const el=document.getElementById('add-ev');
  el.style.display=showAE?'flex':'none';
  if(showAE)el.style.flexDirection='column';
}

function addEvent(){
  const name=document.getElementById('ev-name').value.trim();
  if(!name)return;
  const time=document.getElementById('ev-time').value||'00:00';
  const key=ck(cy,cm,sd);
  if(!evs[key])evs[key]=[];
  evs[key].push({id:eid++,name,time,c:ec});
  evs[key].sort((a,b)=>a.time.localeCompare(b.time));
  document.getElementById('ev-name').value='';
  renderCal();toggleAddEv();
}

function selC(c){
  ec=c;
  ['g','p','c'].forEach(x=>document.getElementById('cd-'+x).classList.toggle('sel',x===c));
}

// init
const tk=ck(TD.getFullYear(),TD.getMonth(),TD.getDate());
evs[tk]=[{id:eid++,name:'morning walk',time:'07:30',c:'g'},{id:eid++,name:'creative time',time:'14:00',c:'p'}];
renderCal();
</script>
</body>
</html>
